name: Deploy Vue Example

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/deploy-vue-example.yml
      - examples/vue/**
      - examples/animations/**
      - src/**
      - package.json
      - package-lock.json
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            examples/vue/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Vue example dependencies
        run: npm ci
        working-directory: examples/vue

      - name: Build Vue example
        run: npm run build -- --mode github-pages
        working-directory: examples/vue

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/vue/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
